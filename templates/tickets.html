<!DOCTYPE html>
<html>

<head>
    <title>My Tickets</title>
</head>

<body>

<h1>My Tickets</h1>

<a href="/">Dashboard</a> |
<a href="{{ url_for('tickets.create_ticket') }}" class="btn btn-success">
    Create Ticket
</a>
<hr>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Priority</th>
    <th>Status</th>
</tr>

{% for ticket in tickets %}

<tr>

<td>{{ ticket.id }}</td>

<td>{{ ticket.title }}</td>

<td>{{ ticket.priority }}</td>

<td>{{ ticket.status }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
