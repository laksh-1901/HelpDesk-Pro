{% extends "base.html" %}

{% block content %}

<div class="card shadow">

<div class="card-header">

<h3>Create Account</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
class="form-control"
name="username"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<button
class="btn btn-primary">

Register

</button>

<a
href="/login"
class="btn btn-secondary">

Login

</a>

</form>

</div>

</div>

{% endblock %}
