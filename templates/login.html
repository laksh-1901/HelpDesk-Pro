{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">
Login
</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
class="form-control"
name="username"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<button class="btn btn-primary w-100">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="/register">

Register

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
